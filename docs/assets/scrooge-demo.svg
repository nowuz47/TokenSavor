<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="630" viewBox="0 0 1120 630" role="img" aria-labelledby="title desc">
  <title id="title">Scrooge usage demo</title>
  <desc id="desc">Animated demo showing a prompt being optimized with Ctrl Alt S and reflected in the dashboard.</desc>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --panel: #182235;
      --panel-2: #202b3f;
      --line: #334155;
      --text: #f8fafc;
      --muted: #a7b0c2;
      --green: #76d99c;
      --blue: #78a9ff;
      --amber: #f9c56b;
      --red: #ff8f8f;
    }
    .bg { fill: var(--bg); }
    .panel { fill: var(--panel); stroke: var(--line); stroke-width: 1.4; }
    .panel2 { fill: var(--panel-2); stroke: var(--line); stroke-width: 1.2; }
    .text { fill: var(--text); font-family: Inter, Segoe UI, Arial, sans-serif; }
    .muted { fill: var(--muted); font-family: Inter, Segoe UI, Arial, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    .step { opacity: 0; animation: fade 9s infinite; }
    .s1 { animation-delay: 0s; }
    .s2 { animation-delay: 3s; }
    .s3 { animation-delay: 6s; }
    .cursor { animation: blink 1s steps(2) infinite; }
    .bar-original { animation: shrinkOriginal 9s infinite; transform-origin: 210px 414px; }
    .bar-optimized { animation: growOptimized 9s infinite; transform-origin: 210px 458px; }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes fade {
      0%, 28% { opacity: 1; }
      33%, 100% { opacity: 0; }
    }
    @keyframes blink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: .55; }
      50% { opacity: 1; }
    }
    @keyframes shrinkOriginal {
      0%, 32% { transform: scaleX(1); }
      40%, 100% { transform: scaleX(.22); }
    }
    @keyframes growOptimized {
      0%, 32% { transform: scaleX(.2); }
      40%, 100% { transform: scaleX(.38); }
    }
  </style>

  <rect class="bg" width="1120" height="630" rx="0"/>
  <rect x="42" y="34" width="1036" height="562" rx="28" fill="#0f172a" stroke="#263449" stroke-width="1.5"/>

  <text class="text" x="86" y="92" font-size="34" font-weight="800">Scrooge</text>
  <text class="muted" x="86" y="126" font-size="17">AI에 보내기 전, 낭비되는 프롬프트 토큰을 줄입니다.</text>

  <rect class="panel" x="78" y="162" width="610" height="370" rx="18"/>
  <text class="text" x="110" y="207" font-size="21" font-weight="750">Codex 입력창</text>
  <text class="muted" x="110" y="235" font-size="15">파일을 이미 첨부한 뒤에도 같은 단축키를 누릅니다.</text>

  <rect class="panel2" x="110" y="268" width="532" height="126" rx="12"/>
  <text class="muted mono" x="132" y="302" font-size="15">첨부한 orders.csv 파일을 보고</text>
  <text class="muted mono" x="132" y="329" font-size="15">한국 지역 매출 이상치를 찾아주세요.</text>
  <text class="blue mono cursor" x="132" y="356" font-size="15">Ctrl + Alt + S</text>

  <rect x="110" y="420" width="532" height="16" rx="8" fill="#334155"/>
  <rect class="bar-original" x="110" y="420" width="532" height="16" rx="8" fill="var(--red)"/>
  <text class="muted" x="110" y="456" font-size="14">원본 첨부 컨텍스트</text>
  <rect x="110" y="474" width="532" height="16" rx="8" fill="#334155"/>
  <rect class="bar-optimized" x="110" y="474" width="532" height="16" rx="8" fill="var(--green)"/>
  <text class="muted" x="110" y="510" font-size="14">Scrooge 최적화 컨텍스트</text>

  <rect class="panel" x="720" y="162" width="320" height="370" rx="18"/>
  <text class="text" x="752" y="207" font-size="21" font-weight="750">실측 카드</text>

  <g class="step s1">
    <text class="muted" x="752" y="252" font-size="15">Step 1</text>
    <text class="text" x="752" y="284" font-size="24" font-weight="800">프롬프트 캡처</text>
    <text class="muted" x="752" y="318" font-size="15">입력창 텍스트를 읽고 첨부 언급을 감지합니다.</text>
  </g>
  <g class="step s2">
    <text class="muted" x="752" y="252" font-size="15">Step 2</text>
    <text class="text" x="752" y="284" font-size="24" font-weight="800">첨부 파일명 감지</text>
    <text class="muted" x="752" y="318" font-size="15">Codex 화면의 파일 칩 이름을 읽습니다.</text>
    <text class="blue mono" x="752" y="352" font-size="15">discovery: codex_uia</text>
  </g>
  <g class="step s3">
    <text class="muted" x="752" y="252" font-size="15">Step 3</text>
    <text class="text" x="752" y="284" font-size="24" font-weight="800">절감량 기록</text>
    <text class="green" x="752" y="330" font-size="42" font-weight="900">91.64%</text>
    <text class="muted" x="752" y="362" font-size="15">샘플 첨부 절감률</text>
  </g>

  <rect x="752" y="418" width="250" height="52" rx="14" fill="#10261a" stroke="#2f6d49"/>
  <circle class="pulse" cx="780" cy="444" r="8" fill="var(--green)"/>
  <text class="text" x="800" y="450" font-size="15" font-weight="700">Dashboard updated</text>

  <text class="muted" x="86" y="570" font-size="14">Controlled measurement. Billing-confirmed savings require provider usage metadata.</text>
</svg>
